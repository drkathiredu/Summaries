version: '3.8'

services:
  clinical-scribe:
    build: .
    container_name: clinical-scribe
    expose:
      - "3000"
    volumes:
      - clinical-data:/app/data
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY}
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  clinical-data:
